# CI/CD Workflow for Blog Project (Modern Artifact Deployment)
name: CI Build and Test

on:
  push:
    branches:
      - main # or master, depending on project default
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 0

    # Step 1: Setup environment (e.g., Python, Node, etc.)
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    # Step 2: Install dependencies and run tests
    - name: Install dependencies (if needed)
      run: |
        pip install -r requirements.txt # Assuming a requirements file exists or use package manager specific to the project
    
    - name: Run Unit Tests
      run: python3 test_blog.py # Using the script we just created

    # Step 3: Generate Artifact (e.g., compiled assets, data JSON)
    - name: Create Build Artifact
      run: |
        echo "Build successful. Saving posts.json and index.html as artifacts."
        mkdir -p build_artifacts
        cp posts.json build_artifacts/
        cp index.html build_artifacts/  

    # Step 4: Upload Artifacts (Modern replacement for gh-pages deployment)
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:      
        name: website-assets-${{ github.sha }}
        path: build_artifacts/

  # Removed direct deployment job to gh-pages to fix 403 error and use modern artifact workflow
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'     
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
